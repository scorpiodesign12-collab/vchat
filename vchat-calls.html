<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>VChat — звонок</title>
<style>
:root{
  --bg:#fff; --fg:#111114; --card:#f1f1f4; --card2:#e8e8ec; --muted:#94949c; --line:#ececef;
  --accent:#1c1c1e; --accent-fg:#fff; --btn:#1c1c1e; --btn-fg:#fff; --accent2:#2C7EFF;
}
@media (prefers-color-scheme: dark){
  :root{ --bg:#0b0b0d; --fg:#f5f5f7; --card:#1c1c1f; --card2:#262629; --muted:#9a9aa2; --line:#222225; --btn:#f5f5f7; --btn-fg:#0b0b0d; }
}
[data-theme="dark"]{ --bg:#0b0b0d; --fg:#f5f5f7; --card:#1c1c1f; --card2:#262629; --muted:#9a9aa2; --line:#222225; --btn:#f5f5f7; --btn-fg:#0b0b0d; }
*{box-sizing:border-box;}
html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;background:var(--bg);color:var(--fg);-webkit-font-smoothing:antialiased;}
body{display:flex;}
#app{width:100%;height:100vh;height:100dvh;position:relative;overflow:hidden;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:60px 28px 50px;text-align:center;}
.topInfo{display:flex;flex-direction:column;align-items:center;gap:6px;margin-top:30px;}
.callStatus{font-size:14px;color:var(--muted);font-weight:500;letter-spacing:.02em;}
.callStatus.connected{color:#34c759;}
.avatarWrap{width:128px;height:128px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:46px;font-weight:700;color:#fff;margin:18px 0 6px;box-shadow:0 8px 30px rgba(0,0,0,.18);position:relative;}
.avatarWrap.ringing{animation:pulse 1.6s ease-in-out infinite;}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(44,126,255,.35);}
  70%{box-shadow:0 0 0 22px rgba(44,126,255,0);}
  100%{box-shadow:0 0 0 0 rgba(44,126,255,0);}
}
.callName{font-size:24px;font-weight:700;margin-top:8px;}
.callTimer{font-size:15px;color:var(--muted);margin-top:6px;font-variant-numeric:tabular-nums;}
.controls{display:flex;align-items:center;justify-content:center;gap:28px;width:100%;max-width:380px;}
.cbtn{width:64px;height:64px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0;}
.cbtn:active{transform:scale(.92);}
.cbtn svg{width:26px;height:26px;}
.cbtn.decline{background:#ff3b30;color:#fff;}
.cbtn.accept{background:#34c759;color:#fff;}
.cbtn.mute{background:var(--card);color:var(--fg);}
.cbtn.mute.on{background:var(--fg);color:var(--bg);}
.cbtn.speaker{background:var(--card);color:var(--fg);}
.cbtn.speaker.on{background:var(--fg);color:var(--bg);}
.incomingRow{display:flex;gap:50px;align-items:center;}
.incomingLabel{font-size:12px;color:var(--muted);margin-top:8px;font-weight:600;}
.btnCol{display:flex;flex-direction:column;align-items:center;gap:8px;}
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);background:var(--card2);color:var(--fg);padding:10px 18px;border-radius:12px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:99;max-width:80%;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div id="app" data-theme="light">
  <div class="topInfo">
    <div class="callStatus" id="callStatus">Вызов...</div>
  </div>

  <div style="display:flex;flex-direction:column;align-items:center;">
    <div class="avatarWrap" id="avatarWrap">?</div>
    <div class="callName" id="callName">—</div>
    <div class="callTimer" id="callTimer" style="display:none;">00:00</div>
  </div>

  <div class="controls" id="controlsOutgoing" style="display:none;">
    <button class="cbtn mute" id="muteBtn" onclick="toggleMute()" title="Микрофон">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
    </button>
    <button class="cbtn decline" onclick="endCall()" title="Завершить">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.4 16.5c-1.3-1.1-2.7-2-4.3-2.6-.4-.2-.9-.1-1.2.2l-1.6 1.6c-2.1-1-3.8-2.7-4.8-4.8l1.6-1.6c.3-.3.4-.8.2-1.2-.6-1.6-1.5-3-2.6-4.3-.4-.4-1-.5-1.5-.2L4.5 5C3.9 5.4 3.6 6 3.7 6.7c.9 6.5 6 11.6 12.6 12.6.7.1 1.3-.2 1.7-.8l1.4-2.7c.3-.5.2-1.1-.2-1.5z" transform="rotate(135 12 12)"/></svg>
    </button>
    <button class="cbtn speaker" id="speakerBtn" onclick="toggleSpeaker()" title="Громкая связь">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
    </button>
  </div>

  <div class="incomingRow" id="controlsIncoming" style="display:none;">
    <div class="btnCol">
      <button class="cbtn decline" onclick="declineCall()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.4 16.5c-1.3-1.1-2.7-2-4.3-2.6-.4-.2-.9-.1-1.2.2l-1.6 1.6c-2.1-1-3.8-2.7-4.8-4.8l1.6-1.6c.3-.3.4-.8.2-1.2-.6-1.6-1.5-3-2.6-4.3-.4-.4-1-.5-1.5-.2L4.5 5C3.9 5.4 3.6 6 3.7 6.7c.9 6.5 6 11.6 12.6 12.6.7.1 1.3-.2 1.7-.8l1.4-2.7c.3-.5.2-1.1-.2-1.5z" transform="rotate(135 12 12)"/></svg>
      </button>
      <span class="incomingLabel">Отклонить</span>
    </div>
    <div class="btnCol">
      <button class="cbtn accept" onclick="acceptCall()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.4 16.5c-1.3-1.1-2.7-2-4.3-2.6-.4-.2-.9-.1-1.2.2l-1.6 1.6c-2.1-1-3.8-2.7-4.8-4.8l1.6-1.6c.3-.3.4-.8.2-1.2-.6-1.6-1.5-3-2.6-4.3-.4-.4-1-.5-1.5-.2L4.5 5C3.9 5.4 3.6 6 3.7 6.7c.9 6.5 6 11.6 12.6 12.6.7.1 1.3-.2 1.7-.8l1.4-2.7c.3-.5.2-1.1-.2-1.5z"/></svg>
      </button>
      <span class="incomingLabel">Принять</span>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://tosomuignedjiczygceh.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvc29tdWlnbmVkamljenlnY2VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MDQ4MjEsImV4cCI6MjA5ODM4MDgyMX0.qosfz4-WAJMO2uUTzYslzkn_H_8atGuiVQqqQ2sz1M4';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const params = new URLSearchParams(window.location.search);
const mode = params.get('mode'); // 'outgoing' | 'incoming'
const otherUid = params.get('uid');
const otherName = params.get('name') || 'Пользователь';
const myId = params.get('myid');
const myName = params.get('myname') || 'Я';
const callId = params.get('callid') || (myId+'-'+Date.now());

if(!mode || !otherUid || !myId){
  window.location.href = 'vchat-menu.html';
}

const COLORS=['#FF6B6B','#4ECDC4','#556FB5','#FFB562','#9D7BFF','#2C7EFF','#34C759','#FF9F0A'];
function colorFor(str){
  let h=0; for(let i=0;i<str.length;i++) h=str.charCodeAt(i)+((h<<5)-h);
  return COLORS[Math.abs(h)%COLORS.length];
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

document.getElementById('callName').textContent = otherName;
const avatarWrap = document.getElementById('avatarWrap');
avatarWrap.textContent = otherName[0] ? otherName[0].toUpperCase() : '?';
avatarWrap.style.background = colorFor(otherName);

let callTimerInterval=null, callSeconds=0, ended=false;
let muted=false, speakerOn=false;

function fmtTime(s){
  const m=Math.floor(s/60).toString().padStart(2,'0');
  const sec=(s%60).toString().padStart(2,'0');
  return m+':'+sec;
}
function startTimer(){
  document.getElementById('callTimer').style.display='block';
  callTimerInterval=setInterval(()=>{
    callSeconds++;
    document.getElementById('callTimer').textContent=fmtTime(callSeconds);
  },1000);
}
function setConnected(){
  avatarWrap.classList.remove('ringing');
  const st=document.getElementById('callStatus');
  st.textContent='Соединено';
  st.classList.add('connected');
  startTimer();
}

// Канал для конкретной сессии звонка — оба участника слушают и шлют события сюда
const sessionChannel = sb.channel('callsession-'+callId, { config:{ broadcast:{ self:false } } });
sessionChannel
  .on('broadcast',{event:'accepted'},()=>{ if(mode==='outgoing') setConnected(); })
  .on('broadcast',{event:'declined'},()=>{ if(!ended){ document.getElementById('callStatus').textContent='Отклонено'; closeSoon(); } })
  .on('broadcast',{event:'hangup'},()=>{ if(!ended){ document.getElementById('callStatus').textContent='Звонок завершён'; closeSoon(); } })
  .subscribe();

function closeSoon(){
  ended=true;
  clearInterval(callTimerInterval);
  setTimeout(()=>{ window.location.href='vchat-menu.html'; },1000);
}

async function checkOnline(uid){
  const {data}=await sb.from('profiles').select('online_at').eq('id',uid).single();
  if(!data||!data.online_at) return false;
  return (Date.now()-new Date(data.online_at).getTime()) < 35000;
}

if(mode==='outgoing'){
  document.getElementById('controlsOutgoing').style.display='flex';
  avatarWrap.classList.add('ringing');
  document.getElementById('callStatus').textContent='Вызов...';
  (async ()=>{
    const online = await checkOnline(otherUid);
    if(!online){
      document.getElementById('callStatus').textContent='Собеседник не в сети';
      showToast(otherName+' сейчас не в сети');
      setTimeout(()=>{ window.location.href='vchat-menu.html'; },1800);
      return;
    }
    const outCh = sb.channel('call-'+otherUid);
    outCh.subscribe((status)=>{
      if(status==='SUBSCRIBED'){
        outCh.send({
          type:'broadcast', event:'incoming_call',
          payload:{ from:myId, fromName:myName, callId:callId }
        });
      }
    });
    // на случай если собеседник не ответит совсем — завершаем сами через 35 сек
    setTimeout(()=>{
      if(!ended && document.getElementById('callStatus').textContent==='Вызов...'){
        document.getElementById('callStatus').textContent='Нет ответа';
        showToast(otherName+' не отвечает');
        ended=true;
        setTimeout(()=>{ window.location.href='vchat-menu.html'; },1500);
      }
    },35000);
  })();
}

if(mode==='incoming'){
  document.getElementById('controlsIncoming').style.display='flex';
  avatarWrap.classList.add('ringing');
  document.getElementById('callStatus').textContent='Входящий звонок';
}

function acceptCall(){
  document.getElementById('controlsIncoming').style.display='none';
  document.getElementById('controlsOutgoing').style.display='flex';
  sessionChannel.send({type:'broadcast',event:'accepted',payload:{}});
  setConnected();
}
function declineCall(){
  sessionChannel.send({type:'broadcast',event:'declined',payload:{}});
  document.getElementById('callStatus').textContent='Вы отклонили звонок';
  ended=true;
  setTimeout(()=>{ window.location.href='vchat-menu.html'; },700);
}
function endCall(){
  sessionChannel.send({type:'broadcast',event:'hangup',payload:{}});
  ended=true;
  clearInterval(callTimerInterval);
  window.location.href='vchat-menu.html';
}
function toggleMute(){
  muted=!muted;
  document.getElementById('muteBtn').classList.toggle('on',muted);
}
function toggleSpeaker(){
  speakerOn=!speakerOn;
  document.getElementById('speakerBtn').classList.toggle('on',speakerOn);
}

window.addEventListener('beforeunload',()=>{
  if(!ended){
    try{ sessionChannel.send({type:'broadcast',event:'hangup',payload:{}}); }catch(e){}
  }
});
</script>
</body>
</html>
