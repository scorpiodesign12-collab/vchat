<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>VChat — звонок</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VChat">
<meta name="theme-color" content="#1c1c1e">
<style>
:root{
  --bg:#fff; --fg:#111114; --card:#f1f1f4; --card2:#e8e8ec; --muted:#94949c; --line:#ececef;
  --accent:#1c1c1e; --accent-fg:#fff; --btn:#1c1c1e; --btn-fg:#fff; --accent2:#2C7EFF;
}
@media (prefers-color-scheme: dark){
  :root{ --bg:#0b0b0d; --fg:#f5f5f7; --card:#1c1c1f; --card2:#262629; --muted:#9a9aa2; --line:#222225; --btn:#f5f5f7; --btn-fg:#0b0b0d; }
}
[data-theme="dark"]{ --bg:#0b0b0d; --fg:#f5f5f7; --card:#1c1c1f; --card2:#262629; --muted:#9a9aa2; --line:#222225; --btn:#f5f5f7; --btn-fg:#0b0b0d; }
*{box-sizing:border-box;}
html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;background:var(--bg);color:var(--fg);-webkit-font-smoothing:antialiased;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;}
body{display:flex;}
#app{width:100%;height:100vh;height:100dvh;position:relative;overflow:hidden;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:60px 28px 50px;text-align:center;}
.topInfo{display:flex;flex-direction:column;align-items:center;gap:6px;margin-top:30px;}
.callStatus{font-size:14px;color:var(--muted);font-weight:500;letter-spacing:.02em;}
.callStatus.connected{color:#34c759;}
.pingRow{display:none;align-items:center;justify-content:center;gap:6px;font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.02em;font-variant-numeric:tabular-nums;}
.pingDot{width:7px;height:7px;border-radius:50%;background:#34c759;flex-shrink:0;}
.pingDot.bad{background:#ff9f0a;}
.pingDot.worse{background:#ff3b30;}
.minimizeBtn{position:absolute;top:18px;left:18px;width:38px;height:38px;border-radius:50%;border:none;background:var(--card);color:var(--fg);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:30;}
.minimizeBtn svg{width:18px;height:18px;}
.minimizeBtn:active{transform:scale(.92);}

.miniWidget{display:none;position:fixed;right:16px;bottom:24px;left:auto;top:auto;z-index:200;align-items:center;gap:10px;background:var(--fg);color:var(--bg);border-radius:30px;padding:8px 10px 8px 16px;box-shadow:0 8px 24px rgba(0,0,0,.28);cursor:grab;touch-action:none;user-select:none;}
.miniWidget:active{cursor:grabbing;}
.miniInfo{display:flex;flex-direction:column;line-height:1.25;margin-right:2px;}
.miniName{font-size:12.5px;font-weight:700;max-width:110px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.miniTimer{font-size:11.5px;opacity:.7;font-variant-numeric:tabular-nums;}
.miniBtn{width:36px;height:36px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;background:rgba(255,255,255,.15);color:var(--bg);}
[data-theme="dark"] .miniBtn{background:rgba(255,255,255,.12);}
.miniBtn svg{width:16px;height:16px;}
.miniBtn.on{background:var(--bg);color:var(--fg);}
.miniBtn.end{background:#ff3b30;color:#fff;}
.avatarWrap{width:128px;height:128px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:46px;font-weight:700;color:#fff;margin:18px 0 6px;box-shadow:0 8px 30px rgba(0,0,0,.18);position:relative;}
.avatarWrap.ringing{animation:pulse 1.6s ease-in-out infinite;}
.micBadge{position:absolute;right:2px;bottom:2px;width:34px;height:34px;border-radius:50%;background:#ff3b30;display:none;align-items:center;justify-content:center;border:3px solid var(--bg);box-shadow:0 2px 8px rgba(0,0,0,.2);}
.micBadge.show{display:flex;}
.micBadge svg{width:17px;height:17px;color:#fff;}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(44,126,255,.35);}
  70%{box-shadow:0 0 0 22px rgba(44,126,255,0);}
  100%{box-shadow:0 0 0 0 rgba(44,126,255,0);}
}
.callName{font-size:24px;font-weight:700;margin-top:8px;}
.callTimer{font-size:15px;color:var(--muted);margin-top:6px;font-variant-numeric:tabular-nums;}
.controls{display:flex;align-items:center;justify-content:center;gap:28px;width:100%;max-width:380px;}
.cbtn{width:64px;height:64px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0;}
.cbtn:active{transform:scale(.92);}
.cbtn svg{width:26px;height:26px;}
.cbtn.decline{background:#ff3b30;color:#fff;}
.cbtn.accept{background:#34c759;color:#fff;}
.cbtn.mute{background:var(--card);color:var(--fg);}
.cbtn.mute.on{background:var(--fg);color:var(--bg);}
.cbtn.speaker{background:var(--card);color:var(--fg);}
.cbtn.speaker.on{background:var(--fg);color:var(--bg);}
.incomingRow{display:flex;gap:50px;align-items:center;}
.incomingLabel{font-size:12px;color:var(--muted);margin-top:8px;font-weight:600;}
.btnCol{display:flex;flex-direction:column;align-items:center;gap:8px;}
.cbtn.decline{box-shadow:0 6px 18px rgba(255,59,48,.35);}
.cbtn.accept{box-shadow:0 6px 18px rgba(52,199,89,.35);}
.cbtn.mute,.cbtn.speaker{border:1px solid var(--line);}
.outgoingLabel{font-size:11px;color:var(--muted);margin-top:8px;font-weight:600;}
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);background:var(--card2);color:var(--fg);padding:10px 18px;border-radius:12px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:99;max-width:80%;}
.toast.show{opacity:1;}
.micErrBanner{position:fixed;left:16px;right:16px;top:18px;background:#3a1414;color:#ffd7d2;border:1px solid #5c1f1f;border-radius:14px;padding:14px 16px;font-size:13px;line-height:1.5;z-index:100;display:none;}
.micErrBanner.show{display:block;}
.micErrBanner b{display:block;margin-bottom:4px;font-size:13.5px;}
.micErrBanner button{margin-top:10px;background:#ff3b30;color:#fff;border:none;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;}
</style>
</head>
<body>

</div>
<div class="toast" id="toast"></div>
<div class="micErrBanner" id="micErrBanner">
  <b>Нет доступа к микрофону</b>
  <span id="micErrText">Разрешите доступ в настройках сайта: нажмите на значок замка (🔒) рядом с адресом сайта → Микрофон → Разрешить, потом обновите страницу и перезвоните.</span>
  <br><button onclick="retryMic()">Запросить доступ снова</button>
</div>
<audio id="remoteAudio" autoplay playsinline></audio>

<div class="miniWidget" id="miniWidget">
  <div class="miniInfo">
    <span class="miniName" id="miniName">—</span>
    <span class="miniTimer" id="miniTimer">00:00</span>
  </div>
  <button class="miniBtn" id="miniMuteBtn" onclick="event.stopPropagation(); toggleMute();" title="Микрофон">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>

  </button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://vchat-proxy.scorpiodesign12.workers.dev';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvc29tdWlnbmVkamljenlnY2VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MDQ4MjEsImV4cCI6MjA5ODM4MDgyMX0.qosfz4-WAJMO2uUTzYslzkn_H_8atGuiVQqqQ2sz1M4';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const params = new URLSearchParams(window.location.search);
const mode = params.get('mode'); // 'outgoing' | 'incoming'
const otherUid = params.get('uid');
const otherName = params.get('name') || 'Пользователь';
const myId = params.get('myid');
const myName = params.get('myname') || 'Я';
const callId = params.get('callid') || (myId+'-'+Date.now());

if(!mode || !otherUid || !myId){
  window.location.href = 'vchat-menu.html';
}

const COLORS=['#FF6B6B','#4ECDC4','#556FB5','#FFB562','#9D7BFF','#2C7EFF','#34C759','#FF9F0A'];
function colorFor(str){
  let h=0; for(let i=0;i<str.length;i++) h=str.charCodeAt(i)+((h<<5)-h);
  return COLORS[Math.abs(h)%COLORS.length];
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

document.getElementById('callName').textContent = otherName;
const avatarWrap = document.getElementById('avatarWrap');
document.getElementById('avatarLetter').textContent = otherName[0] ? otherName[0].toUpperCase() : '?';
avatarWrap.style.background = colorFor(otherName);

let callTimerInterval=null, callSeconds=0, ended=false;
let muted=false, speakerOn=false;
let pc=null, localStream=null, remoteStream=null, disconnectedTimer=null;
let pendingIce=[];
let logged=false;

const RTC_CONFIG={
  // было 'relay' (только через TURN) — если TURN-сервер перегружен/кончилась квота, звонок вообще
  // не мог соединиться, хотя многим парам устройств хватило бы и прямого/STUN пути.
  // 'all' пробует все варианты (host / STUN / TURN) и берёт тот, что реально заработал.
  iceTransportPolicy:'all',
  iceServers:[
  {urls:'stun:stun.l.google.com:19302'},
  {urls:'stun:stun.relay.metered.ca:80'},
  {urls:'turn:global.relay.metered.ca:80', username:'7968711527e898873cea9644', credential:'yBFD3m0sWvNyATLa'},
  {urls:'turn:global.relay.metered.ca:80?transport=tcp', username:'7968711527e898873cea9644', credential:'yBFD3m0sWvNyATLa'},
  {urls:'turn:global.relay.metered.ca:443', username:'7968711527e898873cea9644', credential:'yBFD3m0sWvNyATLa'},
  {urls:'turns:global.relay.metered.ca:443?transport=tcp', username:'7968711527e898873cea9644', credential:'yBFD3m0sWvNyATLa'}
]};
function log(...a){ try{ console.log('[vchat-call]',...a); }catch(e){} }

function unlockAudioPlayback(){
  const audioEl=document.getElementById('remoteAudio');
  audioEl.play().catch(()=>{});
}
document.addEventListener('click',unlockAudioPlayback,{once:false});

function showMicError(name){
  const banner=document.getElementById('micErrBanner');
  const txt=document.getElementById('micErrText');
  const titleEl=banner.querySelector('b');
  if(name==='vpn'){
    titleEl.textContent='Не получается соединиться';
    txt.textContent='Связь не устанавливается дольше 8 секунд. Возможно перегружены сервера-посредники (TURN) или слабый интернет. Попробуйте перезвонить ещё раз, а если не поможет — проверьте интернет-соединение на обоих устройствах.';
  }else if(name==='NotFoundError'){
    titleEl.textContent='Нет доступа к микрофону';
    txt.textContent='Микрофон не найден на этом устройстве. Проверьте, что он подключён и не занят другим приложением.';
  }else{
    titleEl.textContent='Нет доступа к микрофону';
    txt.textContent='Микрофон заблокирован. Сначала проверьте настройки САЙТА (значок 🔒/настроек рядом с адресом → Микрофон → Разрешить). Если пункта "Микрофон" там нет вообще — доступ закрыт на уровне приложения: зайдите в настройки телефона → Приложения → Chrome (или ваш браузер) → Разрешения → Микрофон → Разрешить. После этого обновите страницу и позвоните заново.';
  }
  banner.classList.add('show');
}
function hideMicError(){
  document.getElementById('micErrBanner').classList.remove('show');
}
async function retryMic(){
  localStream=null;
  await getMic();
  if(localStream){
    hideMicError();
    showToast('Микрофон подключён');
    if(pc){
      // если соединение уже создано без микрофона — добавляем дорожку и пересогласовываем
      localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
      try{
        const offer=await pc.createOffer();
        await pc.setLocalDescription(offer);
        safeSend('webrtc-offer',{sdp:pc.localDescription});
      }catch(e){ log('renegotiate after mic retry failed', e.message); }
    }
  }
}
// проверяем разрешение заранее, чтобы предупредить пользователя ещё до того, как он поднимет трубку
if(navigator.permissions && navigator.permissions.query){
  navigator.permissions.query({name:'microphone'}).then(p=>{
    if(p.state==='denied') showMicError();
  }).catch(()=>{});
}

async function getMic(){
  if(localStream) return localStream;
  try{
    localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    log('mic OK, tracks:', localStream.getAudioTracks().map(t=>t.label||'(no label)'));
    hideMicError();
  }catch(e){
    log('mic ERROR', e.name, e.message);
    showToast('Нет доступа к микрофону: '+e.name);
    showMicError(e.name);
    localStream=null;
  }
  return localStream;
}

function createPeer(){
  if(pc) return pc;
  pc=new RTCPeerConnection(RTC_CONFIG);
  remoteStream=new MediaStream();
  document.getElementById('remoteAudio').srcObject=remoteStream;
  pc.ontrack=(e)=>{
    log('ontrack fired, kind:', e.track.kind, 'readyState:', e.track.readyState);
    e.streams[0].getTracks().forEach(t=>remoteStream.addTrack(t));
    const audioEl=document.getElementById('remoteAudio');
    audioEl.srcObject=remoteStream;
    audioEl.play().then(()=>log('audio.play() resolved')).catch((err)=>{ log('audio.play() blocked:',err.name); showToast('Нажмите экран, чтобы включить звук'); });
  };
  pc.oniceconnectionstatechange=()=>{
    if(!pc)return;
    log('iceConnectionState ->', pc.iceConnectionState);
    if(pc.iceConnectionState==='failed'){
      showToast('Проблема со связью, пробуем переподключиться...');
      try{ pc.restartIce && pc.restartIce(); }catch(e){}
    }
    if(pc.iceConnectionState==='connected'||pc.iceConnectionState==='completed'){
      mediaConnected=true;
      clearTimeout(connectWatchdog);
      if(disconnectedTimer){ clearTimeout(disconnectedTimer); disconnectedTimer=null; }
      hideMicError();
      showRealConnectedStatus();
      showToast('Соединение установлено');
    }
    if(pc.iceConnectionState==='disconnected'){
      mediaConnected=false;
      // сеть могла поменяться (вкл/выкл VPN, переключение wifi/мобильный интернет) —
      // даём 3 секунды на самовосстановление, иначе форсируем ice restart
      if(disconnectedTimer) clearTimeout(disconnectedTimer);
      disconnectedTimer=setTimeout(()=>{
        if(pc && (pc.iceConnectionState==='disconnected'||pc.iceConnectionState==='failed')){
          log('still disconnected after 3s, forcing ice restart');
          showToast('Сеть изменилась, переподключаемся...');
          try{ pc.restartIce && pc.restartIce(); }catch(e){}
        }
      },3000);
    }
  };
  pc.onconnectionstatechange=()=>{ if(pc) log('connectionState ->', pc.connectionState); };
  pc.onicegatheringstatechange=()=>{ if(pc) log('iceGatheringState ->', pc.iceGatheringState); };
  pc.onicecandidate=(e)=>{
    if(e.candidate){
      log('local candidate type:', e.candidate.type, e.candidate.protocol);
      safeSend('webrtc-ice',{candidate:e.candidate});
    }else{
      log('ICE gathering complete');
    }
  };
  if(localStream){
    localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
    log('local track(s) added to peer connection');
  }else{
    log('WARNING: creating peer without local stream — no microphone track will be sent!');
  }
  // только звонящая сторона инициирует пересогласование (иначе оба одновременно
  // пришлют offer и получится конфликт "glare")
  if(mode==='outgoing'){
    pc.onnegotiationneeded=async()=>{
      if(!pc) return;
      try{
        const offer=await pc.createOffer({iceRestart:true});
        await pc.setLocalDescription(offer);
        safeSend('webrtc-offer',{sdp:pc.localDescription});
        log('renegotiation offer sent (ice restart)');
      }catch(e){ log('renegotiation failed', e.message); }
    };
  }
  return pc;
}

async function startAsCaller(){
  log('startAsCaller: requesting mic + creating offer');
  await getMic();
  createPeer();
  const offer=await pc.createOffer();
  await pc.setLocalDescription(offer);
  log('offer created and sent');
  safeSend('webrtc-offer',{sdp:pc.localDescription});
  safeSend('mic-state',{muted:muted});
}

async function handleOffer(sdp){
  log('handleOffer: got offer, requesting mic + creating answer');
  await getMic();
  createPeer();
  await pc.setRemoteDescription(new RTCSessionDescription(sdp));
  for(const c of pendingIce){ try{ await pc.addIceCandidate(new RTCIceCandidate(c)); }catch(e){} }
  pendingIce=[];
  const answer=await pc.createAnswer();
  await pc.setLocalDescription(answer);
  log('answer created and sent');
  safeSend('webrtc-answer',{sdp:pc.localDescription});
  safeSend('mic-state',{muted:muted});
}

async function handleAnswer(sdp){
  if(!pc)return;
  log('handleAnswer: got answer');
  await pc.setRemoteDescription(new RTCSessionDescription(sdp));
  for(const c of pendingIce){ try{ await pc.addIceCandidate(new RTCIceCandidate(c)); }catch(e){} }
  pendingIce=[];
}

async function handleIce(candidate){
  let ctype='?'; try{ ctype=(candidate.candidate||'').match(/typ (\w+)/); ctype=ctype?ctype[1]:'?'; }catch(e){}
  if(pc && pc.remoteDescription && pc.remoteDescription.type){
    try{ await pc.addIceCandidate(new RTCIceCandidate(candidate)); log('remote candidate added, type:', ctype); }catch(e){ log('remote candidate ERROR', e.message); }
  }else{
    pendingIce.push(candidate);
    log('remote candidate queued (no remote description yet), type:', ctype);
  }
}

function stopMedia(){
  clearInterval(statsInterval);
  if(localStream){ localStream.getTracks().forEach(t=>t.stop()); localStream=null; }
  if(pc){ pc.close(); pc=null; }
}

function fmtTime(s){
  const m=Math.floor(s/60).toString().padStart(2,'0');
  const sec=(s%60).toString().padStart(2,'0');
  return m+':'+sec;
}
function startTimer(){
  document.getElementById('callTimer').style.display='block';
  callTimerInterval=setInterval(()=>{
    callSeconds++;
    const t=fmtTime(callSeconds);
    document.getElementById('callTimer').textContent=t;
    const mt=document.getElementById('miniTimer');
    if(mt) mt.textContent=t;
  },1000);
}
let mediaConnected=false, connectWatchdog=null, statsInterval=null;
function setConnected(){
  avatarWrap.classList.remove('ringing');
  const st=document.getElementById('callStatus');
  st.textContent='Подключение...';
  st.classList.remove('connected');
  startTimer();
  clearTimeout(connectWatchdog);
  connectWatchdog=setTimeout(()=>{
    if(!mediaConnected && !ended){
      log('connect watchdog: no media connection after 8s');
      showMicError('vpn');
    }
  },8000);
  clearInterval(statsInterval);
  statsInterval=setInterval(diagStats,3000);
}
async function diagStats(){
  if(!pc || ended) { clearInterval(statsInterval); return; }
  try{
    const stats=await pc.getStats();
    let pair=null, candidates={};
    stats.forEach(r=>{
      if(r.type==='candidate-pair' && r.state==='succeeded') pair=r;
      if(r.type==='local-candidate'||r.type==='remote-candidate') candidates[r.id]=r;
    });
    if(pair){
      const loc=candidates[pair.localCandidateId], rem=candidates[pair.remoteCandidateId];
      log('ACTIVE PAIR -> local:', loc&&loc.candidateType, loc&&loc.protocol, '| remote:', rem&&rem.candidateType, rem&&rem.protocol, '| bytesSent:', pair.bytesSent, 'bytesReceived:', pair.bytesReceived);
      if(typeof pair.currentRoundTripTime==='number'){
        updatePingDisplay(pair.currentRoundTripTime*1000);
      }
    }else{
      log('no succeeded candidate-pair yet, iceConnectionState:', pc.iceConnectionState);
    }
  }catch(e){ log('getStats error', e.message); }
}
function showRealConnectedStatus(){
  const st=document.getElementById('callStatus');
  st.textContent='Соединено';
  st.classList.add('connected');
  document.getElementById('pingRow').style.display='flex';
}
function updatePingDisplay(ms){
  const valEl=document.getElementById('pingValue');
  const dot=document.getElementById('pingDot');
  if(!valEl) return;
  if(ms==null || isNaN(ms)){ valEl.textContent='Пинг: — мс'; return; }
  const rounded=Math.round(ms);
  valEl.textContent='Пинг: '+rounded+' мс';
  dot.classList.remove('bad','worse');
  if(rounded>300) dot.classList.add('worse');
  else if(rounded>120) dot.classList.add('bad');
}

// Канал для конкретной сессии звонка — оба участника слушают и шлют события сюда
let channelReady=false;
let sendQueue=[];
const sessionChannel = sb.channel('callsession-'+callId, { config:{ broadcast:{ self:false, ack:true } } });
function safeSend(event,payload){
  if(channelReady){
    sessionChannel.send({type:'broadcast',event:event,payload:payload||{}});
  }else{
    sendQueue.push({event:event,payload:payload||{}});
  }
}
sessionChannel
  .on('broadcast',{event:'accepted'},()=>{ if(mode==='outgoing'){ setConnected(); startAsCaller(); } })
  .on('broadcast',{event:'declined'},()=>{ if(!ended){ document.getElementById('callStatus').textContent='Отклонено'; logCall('declined'); closeSoon(); } })
  .on('broadcast',{event:'hangup'},()=>{ if(!ended){ document.getElementById('callStatus').textContent='Звонок завершён'; logCall('ended'); closeSoon(); } })
  .on('broadcast',{event:'webrtc-offer'},(msg)=>{ handleOffer(msg.payload.sdp); })
  .on('broadcast',{event:'webrtc-answer'},(msg)=>{ handleAnswer(msg.payload.sdp); })
  .on('broadcast',{event:'webrtc-ice'},(msg)=>{ handleIce(msg.payload.candidate); })
  .on('broadcast',{event:'mic-state'},(msg)=>{ updateMicBadge(!!msg.payload.muted); })
  .subscribe((status)=>{
    log('sessionChannel status:', status);
    if(status==='SUBSCRIBED'){
      channelReady=true;
      const q=sendQueue; sendQueue=[];
      q.forEach(m=>sessionChannel.send({type:'broadcast',event:m.event,payload:m.payload}));
    }
  });

function updateMicBadge(otherMuted){
  document.getElementById('micBadge').classList.toggle('show',otherMuted);
}

function closeSoon(){
  ended=true;
  clearInterval(callTimerInterval);
  stopMedia();
  setTimeout(()=>{ window.location.href=chatReturnUrl(); },1000);
}

async function logCall(status){
  if(logged) return;
  logged=true;
  if(mode!=='outgoing') return; // только инициатор звонка пишет запись в чат, чтобы не дублировать
  try{
    await sb.from('messages').insert({
      sender_id:myId, receiver_id:otherUid, type:'call',
      content:JSON.stringify({duration:callSeconds,status:status})
    });
  }catch(e){}
}

async function checkOnline(uid){
  const {data}=await sb.from('profiles').select('online_at').eq('id',uid).single();
  if(!data||!data.online_at) return false;
  return (Date.now()-new Date(data.online_at).getTime()) < 35000;
}

if(mode==='outgoing'){
  document.getElementById('controlsOutgoing').style.display='flex';
  avatarWrap.classList.add('ringing');
  document.getElementById('callStatus').textContent='Вызов...';
  const outCh = sb.channel('call-'+otherUid);
  outCh.subscribe((status)=>{
    if(status==='SUBSCRIBED'){
      outCh.send({
        type:'broadcast', event:'incoming_call',
        payload:{ from:myId, fromName:myName, callId:callId }
      });
    }
  });
  // на случай если собеседник не ответит совсем — завершаем сами через 35 сек
  setTimeout(()=>{
    if(!ended && document.getElementById('callStatus').textContent==='Вызов...'){
      document.getElementById('callStatus').textContent='Нет ответа';
      showToast(otherName+' не отвечает');
      ended=true;
      logCall('missed');
      stopMedia();
      setTimeout(()=>{ window.location.href=chatReturnUrl(); },1500);
    }
  },35000);
}

if(mode==='incoming'){
  document.getElementById('controlsIncoming').style.display='flex';
  avatarWrap.classList.add('ringing');
  document.getElementById('callStatus').textContent='Входящий звонок';
}

function chatReturnUrl(){
  return 'vchat-menu.html?openuid='+encodeURIComponent(otherUid)+'&openname='+encodeURIComponent(otherName);
}

function acceptCall(){
  log('acceptCall clicked');
  document.getElementById('controlsIncoming').style.display='none';
  document.getElementById('controlsOutgoing').style.display='flex';
  safeSend('accepted',{});
  setConnected();
  getMic().then(()=>createPeer());
}
function declineCall(){
  safeSend('declined',{});
  document.getElementById('callStatus').textContent='Вы отклонили звонок';
  ended=true;
  stopMedia();
  setTimeout(()=>{ window.location.href=chatReturnUrl(); },700);
}
function endCall(){
  safeSend('hangup',{});
  logCall('ended');
  ended=true;
  clearInterval(callTimerInterval);
  stopMedia();
  window.location.href=chatReturnUrl();
}
function toggleMute(){
  muted=!muted;
  document.getElementById('muteBtn').classList.toggle('on',muted);
  document.getElementById('miniMuteBtn').classList.toggle('on',muted);
  let lbl=document.getElementById('muteLabel'); if(lbl)lbl.textContent=muted?'Без звука':'Микрофон';
  if(localStream){ localStream.getAudioTracks().forEach(t=>t.enabled=!muted); }
  safeSend('mic-state',{muted:muted});
}
function toggleSpeaker(){
  speakerOn=!speakerOn;
  document.getElementById('speakerBtn').classList.toggle('on',speakerOn);
  let lbl=document.getElementById('speakerLabel'); if(lbl)lbl.textContent=speakerOn?'Динамик вкл':'Динамик';
  const audioEl=document.getElementById('remoteAudio');
  if(audioEl.setSinkId){
    audioEl.setSinkId(speakerOn?'default':'').catch(()=>{});
  }
}

let isMinimized=false;
function minimizeCall(){
  if(isMinimized) return;
  isMinimized=true;
  document.getElementById('app').style.display='none';
  document.getElementById('miniName').textContent=otherName;
  document.getElementById('miniTimer').textContent=document.getElementById('callTimer').textContent;
  document.getElementById('miniMuteBtn').classList.toggle('on',muted);
  const w=document.getElementById('miniWidget');
  w.style.display='flex';
  // сброс на позицию по умолчанию (правый нижний угол) при каждом сворачивании
  w.style.left='auto'; w.style.top='auto'; w.style.right='16px'; w.style.bottom='24px';
}
function restoreCall(){
  if(!isMinimized) return;
  isMinimized=false;
  document.getElementById('miniWidget').style.display='none';
  document.getElementById('app').style.display='flex';
}

// перетаскивание плавающего виджета (свайпом/мышкой) по экрану, тап без движения — разворачивает звонок
(function(){
  const widget=document.getElementById('miniWidget');
  let dragging=false, moved=false, startX=0, startY=0, startLeft=0, startTop=0;
  function pt(e){ return e.touches && e.touches.length ? e.touches[0] : e; }
  function down(e){
    if(e.target.closest('.miniBtn')) return;
    const p=pt(e);
    const rect=widget.getBoundingClientRect();
    dragging=true; moved=false;
    startX=p.clientX; startY=p.clientY; startLeft=rect.left; startTop=rect.top;
    widget.style.right='auto'; widget.style.bottom='auto';
    widget.style.left=rect.left+'px'; widget.style.top=rect.top+'px';
  }
  function move(e){
    if(!dragging) return;
    const p=pt(e);
    const dx=p.clientX-startX, dy=p.clientY-startY;
    if(Math.abs(dx)>6||Math.abs(dy)>6) moved=true;
    let nl=startLeft+dx, nt=startTop+dy;
    nl=Math.max(6,Math.min(window.innerWidth-widget.offsetWidth-6,nl));
    nt=Math.max(6,Math.min(window.innerHeight-widget.offsetHeight-6,nt));
    widget.style.left=nl+'px'; widget.style.top=nt+'px';
    if(e.cancelable) e.preventDefault();
  }
  function up(){
    if(!dragging) return;
    dragging=false;
    if(!moved) restoreCall();
  }
  widget.addEventListener('mousedown',down);
  widget.addEventListener('touchstart',down,{passive:true});
  window.addEventListener('mousemove',move);
  window.addEventListener('touchmove',move,{passive:false});
  window.addEventListener('mouseup',up);
  window.addEventListener('touchend',up);
})();

window.addEventListener('beforeunload',()=>{
  if(!ended){
    try{ sessionChannel.send({type:'broadcast',event:'hangup',payload:{}}); }catch(e){}
  }
});
</script>
